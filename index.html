<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>McMann Group ‚Äî Project Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0a1628;--navy2:#112240;--navy3:#1a3a6b;
  --gold:#c9970a;--gold2:#f0c040;--gold-light:#fef9e7;--gold-dark:#92400e;
  --blue:#1e6fd9;--blue2:#3b8ff5;--blue-pale:#e8f0fe;
  --green:#10b981;--green-light:#d1fae5;--green-dark:#065f46;
  --red:#ef4444;--red-light:#fee2e2;--red-dark:#991b1b;
  --gray:#f2f6ff;--gray2:#e8f0fe;--gray4:#7b9abf;--gray5:#3d5a8a;
  --text:#0a1628;--text2:#3d5a8a;--white:#fff;
  --radius:13px;--radius-sm:7px;
  --sh:0 2px 16px rgba(10,22,40,.09);--border:rgba(30,111,217,.13);
  --sans:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
}
html,body{font-family:var(--sans);background:var(--gray);color:var(--text);min-height:100vh}

/* HEADER */
.hdr{background:linear-gradient(135deg,var(--navy) 0%,var(--navy3) 60%,#1a4a8a 100%);position:sticky;top:0;z-index:100;box-shadow:0 2px 24px rgba(0,0,0,.45)}
.hdr-top{display:flex;align-items:center;justify-content:space-between;padding:12px 24px 10px}
.brand{display:flex;align-items:center;gap:14px}
.logo-badge{width:42px;height:42px;background:linear-gradient(135deg,var(--gold),var(--gold2));border-radius:11px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;color:var(--navy);flex-shrink:0}
.brand-name h1{font-size:16px;font-weight:700;color:#fff;line-height:1.15}
.brand-name p{font-size:10px;color:var(--gold2);letter-spacing:1.6px;font-weight:500;text-transform:uppercase;margin-top:1px}
.hdr-right{display:flex;align-items:center;gap:12px}
.hdr-meta{font-size:10px;color:rgba(255,255,255,.5);text-align:right;line-height:1.9;font-family:var(--mono)}
.hdr-sync{font-size:11px;font-weight:600;padding:6px 14px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;border-radius:var(--radius-sm);cursor:pointer;transition:all .15s}
.hdr-sync:hover{background:rgba(240,192,64,.2);border-color:var(--gold2)}
.tabs-bar{padding:0 24px;display:flex;border-top:1px solid rgba(255,255,255,.07);overflow-x:auto}
.tabs-bar::-webkit-scrollbar{display:none}
.tab-btn{font-size:14px;font-weight:600;color:rgba(255,255,255,.5);padding:12px 20px;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;background:none;border-top:none;border-left:none;border-right:none;transition:all .15s;font-family:var(--sans)}
.tab-btn:hover{color:rgba(255,255,255,.85)}
.tab-btn.active{color:#fff;border-bottom-color:var(--gold)}

/* TAB PANELS */
.tab-panel{display:none;padding:20px 24px 40px}
.tab-panel.active{display:block}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;min-height:300px;flex-direction:column;gap:12px}
.loading-spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-family:var(--mono);font-size:.7rem;color:var(--gray4)}

/* KPI GRID */
.kpi-grid{display:grid;gap:12px;margin-bottom:20px}
.kpi-grid.cols-4{grid-template-columns:repeat(4,1fr)}
.kpi-grid.cols-3{grid-template-columns:repeat(3,1fr)}
.kpi-grid.cols-2{grid-template-columns:repeat(2,1fr)}
.kpi-card{background:var(--white);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--sh);border:1px solid var(--border)}
.kpi-card.blue{border-top:3px solid var(--blue)}
.kpi-card.green{border-top:3px solid var(--green)}
.kpi-card.red{border-top:3px solid var(--red)}
.kpi-card.gold{border-top:3px solid var(--gold)}
.kpi-lbl{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--text2);margin-bottom:6px;font-weight:600}
.kpi-val{font-size:24px;font-weight:800;color:var(--navy);line-height:1}
.kpi-val.green{color:var(--green)}
.kpi-val.red{color:var(--red)}
.kpi-val.gold{color:var(--gold)}
.kpi-sub{font-size:10px;color:var(--gray4);margin-top:5px;font-family:var(--mono)}

/* SECTION CARD */
.sec-card{background:var(--white);border-radius:var(--radius);box-shadow:var(--sh);border:1px solid var(--border);overflow:hidden;margin-bottom:16px}
.sec-head{padding:11px 18px;border-bottom:3px solid var(--gold);display:flex;align-items:center;justify-content:space-between;background:var(--navy2)}
.sec-head h2{font-size:11px;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:.8px}
.sec-head p{font-size:10px;color:rgba(255,255,255,.4);margin-top:1px}
.sec-head-right{display:flex;align-items:center;gap:8px}
.filter-sel{font-family:var(--mono);font-size:11px;padding:5px 10px;border:1px solid rgba(255,255,255,.2);border-radius:4px;color:#fff;background:rgba(255,255,255,.1);cursor:pointer;outline:none}
.filter-sel option{background:var(--navy);color:#fff}

/* TABLE */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:14px}
thead th{background:var(--navy);color:var(--gold2);padding:10px 14px;text-align:left;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;white-space:nowrap}
thead th.r{text-align:right}
tbody tr:hover td{background:var(--blue-pale)}

/* CAT ROW */
tr.cat-row{cursor:pointer}
tr.cat-row td{background:#fff;color:var(--navy);font-weight:700;font-size:14px;padding:10px 14px;border-bottom:1px solid var(--border)}
tr.cat-row.expanded td{background:#f0f5ff}
/* Numbers hidden when expanded ‚Äî shown dim when collapsed */
tr.cat-row:not(.expanded) td.num{font-size:12px;font-weight:400;color:var(--gray4)}
tr.cat-row.expanded td.num{visibility:hidden}

/* DETAIL ROWS */
tr.detail-row{display:none}
tr.detail-row td{background:#f8faff;font-size:12px;color:var(--text2);padding:8px 14px;border-bottom:1px solid var(--border)}
tr.detail-row td:first-child{padding-left:36px}
tr.detail-row.co-row td{background:#fffbeb}
tr.detail-row.over-row td{background:#fff5f5}
tr.detail-row td.num{text-align:right}
tr.detail-row td.num.green{color:var(--green-dark)}
tr.detail-row td.num.red{color:var(--red)}
tr.detail-row td.num.gold{color:var(--gold)}

/* SUBTOTAL ROW */
tr.sub-row{display:none}
tr.sub-row td{background:var(--navy2);font-size:12px;font-weight:700;color:var(--gold2);padding:9px 14px;border-top:1px solid var(--navy);border-bottom:2px solid var(--gold)}
tr.sub-row td.num{text-align:right;color:var(--gold2)}
tr.sub-row td.num.green{color:#6ee7b7}
tr.sub-row td.num.red{color:#fca5a5}
tr.sub-row td:first-child{padding-left:32px}

/* TOTALS */
tr.totals-row td{background:var(--navy);color:var(--gold2);font-weight:700;font-size:12px;padding:10px 14px;border-bottom:none}
tr.totals-row td.num{text-align:right;color:var(--gold2)}
tr.totals-row td.num.green{color:#6ee7b7}
tr.markup-row td{background:var(--gray);font-size:12px;color:var(--text2);padding:8px 14px;border-bottom:1px solid var(--border)}
tr.markup-row td.num{text-align:right}

/* TAGS */
.co-tag{display:inline-flex;align-items:center;font-size:11px;color:var(--gold-dark);background:var(--gold-light);padding:1px 7px;border-radius:4px;font-weight:600;border:1px solid #fcd34d}
.over-tag{display:inline-flex;align-items:center;font-size:11px;color:var(--red-dark);background:var(--red-light);padding:1px 7px;border-radius:4px;font-weight:600}
.invoice-num{font-family:var(--mono);font-size:11px;color:var(--gray4);background:var(--gray2);padding:1px 6px;border-radius:3px}

/* EXPAND BTN */
.exp-btn{background:none;border:none;cursor:pointer;font-size:11px;color:var(--gray4);padding:0;margin-right:8px;transition:transform .18s;display:inline-block;vertical-align:middle}
.exp-btn.open{transform:rotate(90deg)}

/* VENDOR GROUP */
tr.vendor-row{cursor:pointer}
tr.vendor-row td{background:#fff;color:var(--navy);font-weight:600;font-size:13px;padding:10px 14px;border-bottom:1px solid var(--border)}
tr.vendor-row:not(.expanded) td.num{font-size:12px;font-weight:400;color:var(--gray4)}
tr.vendor-row.expanded td.num{visibility:hidden}
tr.vendor-detail{display:none}
tr.vendor-detail td{background:#f8faff;font-size:12px;color:var(--text2);padding:8px 14px;border-bottom:1px solid var(--border)}
tr.vendor-detail td:first-child{padding-left:32px}
tr.vendor-detail td.num{text-align:right}
tr.vendor-sub{display:none}
tr.vendor-sub td{background:var(--navy2);font-size:12px;font-weight:700;color:var(--gold2);padding:9px 14px;border-top:1px solid var(--navy);border-bottom:2px solid var(--gold)}
tr.vendor-sub td.num{text-align:right;color:var(--gold2)}
tr.vendor-sub td:first-child{padding-left:28px}

/* TIMESHEET GROUP */
tr.ts-group-row{cursor:pointer}
tr.ts-group-row td{background:#fff;color:var(--navy);font-weight:600;font-size:13px;padding:10px 14px;border-bottom:1px solid var(--border)}
tr.ts-group-row:not(.expanded) td.num{font-size:13px;font-weight:700;color:var(--navy)}
tr.ts-group-row.expanded td.num{visibility:hidden}
tr.ts-detail{display:none}
tr.ts-detail td{background:#f8faff;font-size:12px;padding:7px 14px;border-bottom:1px solid var(--border)}
tr.ts-detail td:first-child{padding-left:28px;font-family:var(--mono);font-size:11px;color:var(--text2)}
tr.ts-detail td.name{font-weight:600;color:var(--navy)}
tr.ts-detail td.num{text-align:right;font-weight:700;color:var(--blue)}
tr.ts-total-row td{background:var(--navy);color:var(--gold2);font-weight:700;font-size:13px;padding:10px 14px}
tr.ts-total-row td.num{text-align:right;color:var(--gold2)}

/* SCHEDULE / CALENDAR */
.phase-wrap{padding:16px 18px;display:flex;flex-direction:column;gap:12px}
.phase-row{display:flex;align-items:center;gap:12px}
.phase-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.phase-name{font-size:13px;font-weight:500;color:var(--text);width:200px;flex-shrink:0}
.phase-track{flex:1;height:22px;background:#f1f5f9;border-radius:4px;overflow:hidden;position:relative}
.phase-fill{height:100%;border-radius:4px;display:flex;align-items:center;transition:width .6s ease}
.phase-pct{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:9px;color:rgba(255,255,255,.9);font-weight:700}
.phase-sched{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:9px;color:#94a3b8;font-weight:600;letter-spacing:.3px}
.phase-dates{font-size:10px;color:var(--gray4);width:140px;text-align:right;flex-shrink:0;font-family:var(--mono)}
.cal-card{background:var(--white);border-radius:var(--radius);box-shadow:var(--sh);border:1px solid var(--border);overflow:hidden}
.cal-head{display:flex;align-items:center;justify-content:space-between;padding:11px 18px;border-bottom:3px solid var(--gold);background:var(--navy2)}
.cal-head-title{font-size:11px;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:.8px}
.cal-nav{display:flex;align-items:center;gap:8px}
.cal-nav-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;padding:4px 12px;border-radius:4px;cursor:pointer;font-size:12px;transition:all .15s}
.cal-nav-btn:hover{background:rgba(240,192,64,.2);border-color:var(--gold2)}
#cal-month-label{font-size:12px;font-weight:700;color:var(--gold2);min-width:130px;text-align:center}
.cal-dow{display:grid;grid-template-columns:repeat(7,1fr);background:var(--navy)}
.cal-dow div{text-align:center;font-family:var(--mono);font-size:10px;font-weight:600;color:rgba(255,255,255,.5);padding:8px 2px;letter-spacing:.5px}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-day{min-height:76px;padding:7px 8px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);background:#fff}
.cal-day:nth-child(7n){border-right:none}
.cal-day.other-month{background:#f8faff;opacity:.5}
.cal-day.today-cell{background:#eff6ff;border-top:3px solid var(--blue)}
.cal-day.has-tasks{cursor:pointer}
.cal-day.has-tasks:hover{background:var(--blue-pale)}
.cal-day-num{font-size:13px;font-weight:700;color:var(--text2);margin-bottom:4px}
.today-cell .cal-day-num{background:var(--blue);color:#fff;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px}
.task-pip{font-size:10px;font-weight:500;padding:2px 6px;border-radius:3px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cal-popup{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;border-radius:var(--radius);box-shadow:0 8px 40px rgba(10,22,40,.25);border:1px solid var(--border);width:340px;z-index:500;overflow:hidden}
.cal-popup.open{display:block}
.cal-popup-hdr{background:var(--navy2);padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.cal-popup-close{background:none;border:none;color:rgba(255,255,255,.6);cursor:pointer;font-size:16px}
.cal-popup-body{padding:12px 16px;max-height:260px;overflow-y:auto}
.cal-popup-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.cal-popup-item:last-child{border-bottom:none}

/* LEGEND */
.legend{display:flex;gap:14px;padding:8px 18px;border-bottom:1px solid var(--border);flex-wrap:wrap;background:#f8faff}
.leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2)}
.leg-dot{width:12px;height:12px;border-radius:3px}

/* NO DATA */
.no-data{padding:48px;text-align:center;color:var(--gray4)}
.no-data-icon{font-size:40px;opacity:.25;margin-bottom:12px}
.no-data-title{font-size:.9rem;font-weight:700;margin-bottom:6px}
.no-data-sub{font-family:var(--mono);font-size:.62rem;line-height:1.9}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-top">
    <div class="brand">
      <div class="logo-badge">MM</div>
      <div class="brand-name">
        <h1 id="hdr-job">McMann Group</h1>
        <p id="hdr-client">Loading...</p>
      </div>
    </div>
    <div class="hdr-right">
      <div class="hdr-meta" id="hdr-meta">Updated: ‚Äî</div>
      <button class="hdr-sync" onclick="loadData()">‚Üª Sync</button>
    </div>
  </div>
  <div class="tabs-bar">
    <button class="tab-btn active" onclick="showTab('cost',this)">Cost Breakdown</button>
    <button class="tab-btn" onclick="showTab('timesheet',this)">Timesheet</button>
    <button class="tab-btn" onclick="showTab('materials',this)">Materials / Vendors</button>
    <button class="tab-btn" onclick="showTab('schedule',this)">Schedule</button>
    <button class="tab-btn" onclick="showTab('calendar',this)">Calendar</button>
  </div>
</div>

<div class="tab-panel active" id="tab-cost"><div class="loading"><div class="loading-spinner"></div><div class="loading-text">Loading...</div></div></div>
<div class="tab-panel" id="tab-timesheet"></div>
<div class="tab-panel" id="tab-materials"></div>
<div class="tab-panel" id="tab-schedule"></div>
<div class="tab-panel" id="tab-calendar"></div>

<div class="cal-popup" id="cal-popup">
  <div class="cal-popup-hdr">
    <span id="cal-popup-title" style="font-size:12px;font-weight:700;color:#fff"></span>
    <button class="cal-popup-close" onclick="closeCalPopup()">√ó</button>
  </div>
  <div class="cal-popup-body" id="cal-popup-body"></div>
</div>

<script>
var D = null; // global data
var mondayItems = [];
var _calYear = new Date().getFullYear();
var _calMonth = new Date().getMonth();
var _calItems = [];
var _MOS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

// ‚îÄ‚îÄ HELPERS ‚îÄ‚îÄ
function fC(v){
  if(v===null||v===undefined||v==='')return'‚Äî';
  var n=parseFloat(v);
  if(isNaN(n))return v;
  return '$'+n.toLocaleString('en-CA',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function fCshort(v){
  var n=parseFloat(v)||0;
  if(n>=1000000)return'$'+(n/1000000).toFixed(1)+'M';
  if(n>=1000)return'$'+(n/1000).toFixed(0)+'K';
  return fC(n);
}
function $(id){return document.getElementById(id)}
function setText(id,val){var el=$(id);if(el)el.textContent=val}

// ‚îÄ‚îÄ TABS ‚îÄ‚îÄ
function showTab(id,btn){
  document.querySelectorAll('.tab-panel').forEach(function(p){p.classList.remove('active')});
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active')});
  $('tab-'+id).classList.add('active');
  btn.classList.add('active');
}

// ‚îÄ‚îÄ TOGGLE ‚îÄ‚îÄ
function toggleGroup(id,type){
  var btn=$('exp-'+id);
  if(!btn)return;
  var isOpen=btn.classList.contains('open');
  btn.classList.toggle('open',!isOpen);
  // toggle cat row expanded class
  var catRow=$(type+'-cat-'+id);
  if(catRow)catRow.classList.toggle('expanded',!isOpen);
  // toggle detail and sub rows
  document.querySelectorAll('[data-group="'+id+'"]').forEach(function(r){
    r.style.display=isOpen?'none':'table-row';
  });
  var subRow=$(type+'-sub-'+id);
  if(subRow)subRow.style.display=isOpen?'none':'table-row';
}

// ‚îÄ‚îÄ LOAD DATA ‚îÄ‚îÄ
function loadData(){
  fetch('/data.json?v='+Date.now())
    .then(function(r){return r.json()})
    .then(function(data){
      D=data;
      renderAll(data);
    })
    .catch(function(e){
      console.error('Load failed',e);
      $('tab-cost').innerHTML='<div class="no-data"><div class="no-data-icon">‚öÝ</div><div class="no-data-title">Could not load data</div><div class="no-data-sub">Check data.json exists on the server</div></div>';
    });
}

function renderAll(data){
  setText('hdr-job', data.job||'McMann Group');
  setText('hdr-client', data.client||'');
  setText('hdr-meta', 'Updated: '+(data.updated||'‚Äî'));
  renderCost(data.costBreakdown||{});
  renderTimesheet(data.timesheet||{});
  renderMaterials(data.materials||{});
  renderSchedule(data.schedule||[]);
  renderCalendar();
}

// ‚îÄ‚îÄ COST BREAKDOWN ‚îÄ‚îÄ
function renderCost(cb){
  var cats = cb.categories||[];
  var tots = cb.totals||[];
  if(!cats.length){
    $('tab-cost').innerHTML='<div class="no-data"><div class="no-data-icon">üìä</div><div class="no-data-title">No cost breakdown data</div></div>';
    return;
  }

  // KPIs from PROJECT TOTAL
  var projTotal = tots.find(function(t){return t.label==='PROJECT TOTAL'}) || {};
  var projSub = tots.find(function(t){return t.label==='Project Subtotal'}) || {};
  var budget = projTotal.budget||0;
  var totInv = projTotal.totInv||0;
  var tbc = projTotal.tbc||0;
  var co = projTotal.co||0;
  var ob = projTotal.ob||0;

  var html = '<div class="kpi-grid cols-4">'
    +'<div class="kpi-card blue"><div class="kpi-lbl">Total Budget</div><div class="kpi-val">'+fC(budget)+'</div><div class="kpi-sub">Incl. markup + GST</div></div>'
    +'<div class="kpi-card '+(totInv>budget?'red':'blue')+'"><div class="kpi-lbl">Total Invoiced</div><div class="kpi-val '+(totInv>budget?'red':'')+'">'+fC(totInv)+'</div><div class="kpi-sub">'+(budget>0?((totInv/budget)*100).toFixed(1)+'% of budget':'')+'</div></div>'
    +'<div class="kpi-card '+(tbc<0?'red':'green')+'"><div class="kpi-lbl">To Be Completed</div><div class="kpi-val '+(tbc<0?'red':'green')+'">'+fC(tbc)+'</div><div class="kpi-sub">'+(tbc>=0?'Remaining':'Over budget')+'</div></div>'
    +'<div class="kpi-card gold"><div class="kpi-lbl">Change Orders</div><div class="kpi-val gold">'+fC(co)+'</div><div class="kpi-sub">Total CO value</div></div>'
    +'</div>'
    +'<div class="sec-card">'
    +'<div class="sec-head"><div><h2>Cost Breakdown by Category</h2><p>Click any row to expand ¬∑ Numbers hide on expand, shown dim when collapsed</p></div></div>'
    +'<div class="legend">'
    +'<div class="leg-item"><div class="leg-dot" style="background:#fee2e2;border:1px solid #fca5a5"></div>Over budget</div>'
    +'<div class="leg-item"><div class="leg-dot" style="background:#fef3c7;border:1px solid #fcd34d"></div>Change order</div>'
    +'<div class="leg-item"><div class="leg-dot" style="background:#f8faff;border:1px solid #cbd5e1"></div>Detail row</div>'
    +'</div>'
    +'<div class="tbl-wrap"><table>'

// Override toggleGroup for ts to handle num cell visibility
var _origToggle=toggleGroup;
function toggleGroup(id,type){
  var btn=$('exp-'+id);
  if(!btn)return;
  var isOpen=btn.classList.contains('open');
  btn.classList.toggle('open',!isOpen);
  var catRow=$(type+'-cat-'+id)||$(type+'-grp-'+id);
  if(catRow)catRow.classList.toggle('expanded',!isOpen);

  document.querySelectorAll('[data-group="'+id+'"]').forEach(function(r){
    r.style.display=isOpen?'none':'table-row';
  });
  var subRow=$(type+'-sub-'+id);
  if(subRow)subRow.style.display=isOpen?'none':'table-row';

  // Handle ts num cell visibility
  var tsNum=$('ts-num-'+id);
  if(tsNum)tsNum.style.visibility=isOpen?'visible':'hidden';
  var vsNum=$('vs-num-'+id);
  if(vsNum)vsNum.style.visibility=isOpen?'visible':'hidden';
}

// ‚îÄ‚îÄ SCHEDULE ‚îÄ‚îÄ
function renderSchedule(items){
  mondayItems=items;
  _calItems=items;

  if(!items||!items.length){
    $('tab-schedule').innerHTML='<div class="no-data"><div class="no-data-icon">üìÖ</div><div class="no-data-title">No schedule data</div><div class="no-data-sub">Schedule syncs live from Monday.com via the admin panel</div></div>';
    return;
  }

  // Group by group name
  var groups={},groupOrder=[];
  items.forEach(function(item){
    var g=item.group||'General';
    if(!groups[g]){groups[g]={total:0,done:0,start:'',end:''};groupOrder.push(g);}
    groups[g].total++;
    if((item.status||'').toLowerCase()==='done')groups[g].done++;
    if(item.timeline){
      var parts=item.timeline.split(' - ');
      if(parts[0]&&(!groups[g].start||parts[0]<groups[g].start))groups[g].start=parts[0];
      if(parts[1]&&(!groups[g].end||parts[1]>groups[g].end))groups[g].end=parts[1];
    }
  });

  var MO=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  function fmtRange(s,e){
    if(!s)return'‚Äî';
    var sd=new Date(s),ed=new Date(e||s);
    return MO[sd.getMonth()]+' '+sd.getFullYear()+' ‚Äì '+MO[ed.getMonth()]+' '+ed.getFullYear();
  }

  var html='<div class="sec-card">'
    +'<div class="sec-head"><div><h2>Construction Phases</h2><p>Live ¬∑ Monday.com</p></div></div>'
    +'<div class="phase-wrap">';

  groupOrder.forEach(function(g){
    var grp=groups[g];
    var pct=grp.total>0?Math.round((grp.done/grp.total)*100):0;
    var color=pct===100?'#15803d':pct>0?'#1e6fd9':'#9ca3af';
    html+='<div class="phase-row">'
      +'<div class="phase-dot" style="background:'+color+'"></div>'
      +'<div class="phase-name">'+g+'</div>'
      +'<div class="phase-track">'+(pct>0?'<div class="phase-fill" style="width:'+pct+'%;background:'+color+'"><span class="phase-pct">'+(pct===100?'Complete':pct+'%')+'</span></div>':'<span class="phase-sched">SCHEDULED</span>')+'</div>'
      +'<div class="phase-dates">'+fmtRange(grp.start,grp.end)+'</div>'
      +'</div>';
  });

  html+='</div></div>';
  $('tab-schedule').innerHTML=html;
}

// ‚îÄ‚îÄ CALENDAR ‚îÄ‚îÄ
function renderCalendar(){
  var html='<div class="cal-card">'
    +'<div class="cal-head"><div class="cal-head-title">Project Calendar</div>'
    +'<div class="cal-nav"><button class="cal-nav-btn" onclick="calNav(-1)">‚óÄ</button>'
    +'<span id="cal-month-label"></span>'
    +'<button class="cal-nav-btn" onclick="calNav(1)">‚ñ∂</button></div></div>'
    +'<div class="cal-dow"><div>SUN</div><div>MON</div><div>TUE</div><div>WED</div><div>THU</div><div>FRI</div><div>SAT</div></div>'
    +'<div class="cal-days" id="cal-days"></div>'
    +'</div>';
  $('tab-calendar').innerHTML=html;
  buildCalDays();
}

function buildCalDays(){
  var lbl=$('cal-month-label');
  if(lbl)lbl.textContent=_MOS[_calMonth]+' '+_calYear;
  var td=new Date();td.setHours(0,0,0,0);
  var dm={};
  _calItems.forEach(function(it){
    if(!it.timeline)return;
    var p=it.timeline.split(' - ');
    var d=new Date(p[0]);
    if(isNaN(d)||d.getFullYear()!==_calYear||d.getMonth()!==_calMonth)return;
    var k=p[0];if(!dm[k])dm[k]=[];dm[k].push(it);
  });
  var fd=new Date(_calYear,_calMonth,1).getDay();
  var dim=new Date(_calYear,_calMonth+1,0).getDate();
  var pd=new Date(_calYear,_calMonth,0).getDate();
  var h='',cc=0;
  for(var i=fd-1;i>=0;i--){h+='<div class="cal-day other-month"><div class="cal-day-num">'+(pd-i)+'</div></div>';cc++;}
  for(var d2=1;d2<=dim;d2++){
    var mm=String(_calMonth+1).padStart(2,'0');
    var dd2=String(d2).padStart(2,'0');
    var k2=_calYear+'-'+mm+'-'+dd2;
    var ts=dm[k2]||[];
    var isT=(new Date(_calYear,_calMonth,d2).getTime()===td.getTime());
    var pips='';
    ts.slice(0,2).forEach(function(t){
      var s=(t.status||'').toLowerCase();
      var bg=s==='done'?'#d1fae5':'#dbeafe';
      var co=s==='done'?'#065f46':'#1e40af';
      var lb=t.name.length>16?t.name.slice(0,14)+'...':t.name;
      pips+='<div class="task-pip" style="background:'+bg+';color:'+co+'">'+lb+'</div>';
    });
    if(ts.length>2)pips+='<div class="task-pip" style="background:#f1f5f9;color:#475569">+'+(ts.length-2)+' more</div>';
    var oc=ts.length?' onclick="openCalPopup(this)" data-key="'+k2+'" data-day="'+d2+'"':'';
    h+='<div class="cal-day'+(isT?' today-cell':'')+(ts.length?' has-tasks':'')+'"'+oc+'><div class="cal-day-num">'+d2+'</div>'+pips+'</div>';
    cc++;
  }
  var tr=(7-(cc%7))%7;
  for(var t2=1;t2<=tr;t2++)h+='<div class="cal-day other-month"><div class="cal-day-num">'+t2+'</div></div>';
  var g=$('cal-days');if(g)g.innerHTML=h;
}

function calNav(dir){
  _calMonth+=dir;
  if(_calMonth>11){_calMonth=0;_calYear++;}
  if(_calMonth<0){_calMonth=11;_calYear--;}
  buildCalDays();
}

function openCalPopup(el){
  var k=el.dataset.key,dayNum=el.dataset.day;
  var ts=_calItems.filter(function(it){return it.timeline&&it.timeline.split(' - ')[0]===k;});
  if(!ts.length)return;
  var te=$('cal-popup-title');
  if(te)te.textContent=_MOS[_calMonth]+' '+dayNum+', '+_calYear+' ‚Äî '+ts.length+' task'+(ts.length>1?'s':'');
  var bd=$('cal-popup-body');
  if(bd){
    var h='';
    ts.forEach(function(t){
      var s=(t.status||'').toLowerCase();
      var bg=s==='done'?'#d1fae5':s.indexOf('progress')>-1?'#dbeafe':'#f1f5f9';
      var co=s==='done'?'#065f46':s.indexOf('progress')>-1?'#1e40af':'#475569';
      h+='<div class="cal-popup-item"><div style="flex:1"><div style="font-size:12px;font-weight:600;color:var(--text)">'+t.name+'</div><div style="font-size:10px;color:var(--gray4);margin-top:1px;font-family:var(--mono)">'+t.group+'</div></div><span style="font-size:10px;font-weight:600;padding:2px 9px;border-radius:99px;background:'+bg+';color:'+co+'">'+(t.status||'Scheduled')+'</span></div>';
    });
    bd.innerHTML=h;
  }
  $('cal-popup').classList.add('open');
}

function closeCalPopup(){$('cal-popup').classList.remove('open');}
