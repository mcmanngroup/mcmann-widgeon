<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>McMann Group Inc. — Project Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0a1628;--navy2:#112240;--navy3:#1a3a6b;
  --gold:#c9970a;--gold2:#f0c040;--gold-light:#fef9e7;--gold-dark:#92400e;
  --blue:#1e6fd9;--blue2:#3b8ff5;--blue-pale:#e8f0fe;
  --green:#10b981;--green-light:#d1fae5;--green-dark:#065f46;
  --red:#ef4444;--red-light:#fee2e2;--red-dark:#991b1b;
  --gray:#f2f6ff;--gray2:#e8f0fe;--gray4:#7b9abf;--gray5:#3d5a8a;
  --text:#0a1628;--text2:#3d5a8a;--white:#fff;
  --radius:13px;--radius-sm:7px;
  --sh:0 2px 16px rgba(10,22,40,.09);--border:rgba(30,111,217,.13);
  --sans:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
}
html,body{font-family:var(--sans);background:var(--gray);color:var(--text);min-height:100vh}

/* HEADER */
.hdr{background:linear-gradient(135deg,var(--navy) 0%,var(--navy3) 60%,#1a4a8a 100%);position:sticky;top:0;z-index:300;box-shadow:0 2px 24px rgba(0,0,0,.45)}
.hdr-top{display:flex;align-items:center;justify-content:space-between;padding:16px 22px 12px}
.brand{display:flex;align-items:center;gap:16px}
.logo-badge{width:48px;height:48px;background:linear-gradient(135deg,var(--gold),var(--gold2));border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:17px;color:var(--navy);flex-shrink:0}
.brand-name h1{font-size:22px;font-weight:800;color:#fff;line-height:1.15}
.brand-name p{font-size:13px;color:var(--gold2);letter-spacing:1.4px;font-weight:600;text-transform:uppercase;margin-top:2px}
.brand-sub{margin-top:6px;display:flex;flex-direction:column;gap:4px}
.brand-sub-row{display:flex;align-items:center;gap:6px}
.brand-sub-label{font-size:12px;font-weight:700;color:var(--gold2);text-transform:uppercase;letter-spacing:.5px;flex-shrink:0}
.brand-sub-val{font-size:13px;font-weight:500;color:#fff}
.hdr-right{display:flex;align-items:center;gap:8px}
.btn{font-family:var(--sans);font-size:11px;font-weight:700;padding:6px 14px;border-radius:var(--radius-sm);cursor:pointer;border:none;transition:.15s;letter-spacing:.03em}
.btn-sync{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--navy)}
.btn-sync:hover{opacity:.88}
.btn-pdf{background:var(--blue);color:#fff}
.btn-pdf:hover{background:var(--blue2)}
.tabs-bar{padding:0 22px;display:flex;border-top:1px solid rgba(255,255,255,.07);overflow-x:auto}
.tabs-bar::-webkit-scrollbar{display:none}
.tab-btn{font-size:14px;font-weight:600;color:rgba(255,255,255,.55);padding:12px 20px;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;background:none;border-top:none;border-left:none;border-right:none;transition:color .15s,border-color .15s;font-family:var(--sans)}
.tab-btn:hover{color:rgba(255,255,255,.85)}
.tab-btn.active{color:#fff;border-bottom-color:var(--gold)}

/* TAB PANELS */
.tab-panel{display:none;padding:18px 22px 50px}
.tab-panel.active{display:block}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;min-height:300px;flex-direction:column;gap:12px}
.loading-spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-family:var(--mono);font-size:.7rem;color:var(--gray4)}

/* KPI GRID */
.kpi-grid{display:grid;gap:12px;margin-bottom:16px}
.kpi-grid.cols-4{grid-template-columns:repeat(4,1fr)}
.kpi-grid.cols-3{grid-template-columns:repeat(3,1fr)}
.kpi-grid.cols-2{grid-template-columns:repeat(2,1fr)}
.kpi-card{background:var(--white);border-radius:var(--radius);padding:15px 17px;box-shadow:var(--sh);border:1px solid var(--border)}
.kpi-card.blue{border-top:3px solid var(--blue)}
.kpi-card.green{border-top:3px solid var(--green)}
.kpi-card.red{border-top:3px solid var(--red)}
.kpi-card.gold{border-top:3px solid var(--gold)}
.kpi-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--text2);margin-bottom:5px;font-weight:700}
.kpi-val{font-size:24px;font-weight:800;color:var(--navy);line-height:1.05}
.kpi-val.green{color:var(--green)}
.kpi-val.red{color:var(--red)}
.kpi-val.gold{color:var(--gold)}
.kpi-sub{font-size:10px;color:var(--gray4);margin-top:4px}

/* BUDGET PROGRESS CARD */
.budget-card{background:var(--white);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--sh);border:1px solid var(--border);margin-bottom:16px}
.budget-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.9px;color:var(--text2);margin-bottom:14px}
.budget-kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.bkpi{border-radius:10px;padding:14px 15px}
.bkpi.blue{background:#eff6ff;border-left:4px solid #1e6fd9}
.bkpi.green{background:#f0fdf4;border-left:4px solid #15803d}
.bkpi.gold{background:#fffbeb;border-left:4px solid #c9970a}
.bkpi-label{font-size:10px;text-transform:uppercase;letter-spacing:.7px;font-weight:700;margin-bottom:5px}
.bkpi.blue .bkpi-label{color:#1e4d8c}
.bkpi.green .bkpi-label{color:#14532d}
.bkpi.gold .bkpi-label{color:#78350f}
.bkpi-val{font-size:22px;font-weight:800;line-height:1.1}
.bkpi.blue .bkpi-val{color:#1e6fd9}
.bkpi.green .bkpi-val{color:#15803d}
.bkpi.gold .bkpi-val{color:#c9970a}
.bkpi-sub{font-size:11px;margin-top:3px}
.bkpi.blue .bkpi-sub{color:#3b82f6}
.bkpi.green .bkpi-sub{color:#16a34a}
.bkpi.gold .bkpi-sub{color:#d97706}
.bkpi-bar{height:5px;background:rgba(0,0,0,.08);border-radius:99px;overflow:hidden;margin-top:10px}
.bkpi-bar-fill{height:100%;border-radius:99px;transition:width .6s}
.budget-divider{height:1px;background:var(--border);margin-bottom:14px}
.pbar-row{display:flex;align-items:center;gap:10px;margin-bottom:7px}
.pbar-row:last-child{margin-bottom:0}
.pbar-label{font-size:12px;font-weight:600;width:110px;flex-shrink:0}
.pbar-track{flex:1;height:13px;border-radius:99px;overflow:hidden}
.pbar-fill{height:100%;border-radius:99px;transition:width .6s ease;min-width:4px}
.pbar-pct{font-size:13px;font-weight:700;width:48px;text-align:right;flex-shrink:0}

/* SECTION CARD */
.sec-card{background:var(--white);border-radius:var(--radius);box-shadow:var(--sh);border:1px solid var(--border);overflow:hidden;margin-bottom:16px}
.sec-head{padding:11px 18px;border-bottom:3px solid var(--gold);display:flex;align-items:center;justify-content:space-between;background:var(--navy2)}
.sec-head h2{font-size:11px;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:.8px}
.sec-head p{font-size:10px;color:rgba(255,255,255,.5);margin-top:1px}
.sec-head-right{display:flex;align-items:center;gap:6px}
.filter-sel{font-family:var(--mono);font-size:11px;padding:5px 10px;border:1px solid rgba(255,255,255,.2);border-radius:4px;color:#fff;background:rgba(255,255,255,.1);cursor:pointer;outline:none}
.filter-sel option{background:var(--navy);color:#fff}
/* section header action buttons */
.sh-btn{background:#fff;color:#0a1628;border:1.5px solid #fff;font-size:11px;font-weight:600;padding:6px 12px;border-radius:4px;cursor:pointer;display:inline-flex;align-items:center;gap:3px;white-space:nowrap;line-height:1;letter-spacing:.2px;font-family:var(--sans)}
.sh-btn:hover{background:#f0f4ff}
.sh-btn-group{display:inline-flex;border-radius:4px;overflow:hidden;border:1.5px solid #fff}
.sh-btn-group button{background:#fff;color:#0a1628;border:none;border-right:1px solid #c8d4e8;font-size:8px;font-weight:700;padding:3px 7px;cursor:pointer;white-space:nowrap;line-height:1;letter-spacing:.2px;font-family:var(--sans)}
.sh-btn-group button:last-child{border-right:none}
.sh-btn-group button:hover{background:#e8f0fe}
.sh-dd-wrap{position:relative;display:inline-block}
.sh-toolbar{padding:10px 18px;border-bottom:1px solid var(--border);display:flex;gap:8px;background:#fff}
.sh-toolbar .sh-btn-group{border:1.5px solid #c8d4e8}
.sh-toolbar .sh-btn-group button{font-size:11px;padding:6px 12px;color:#0a1628;font-weight:600}
.sh-dd-menu{display:none;position:absolute;right:0;top:calc(100% + 4px);background:#fff;border:1px solid #c0c8d8;border-radius:6px;min-width:165px;z-index:99;overflow:hidden;box-shadow:0 4px 14px rgba(0,0,0,.15)}
.sh-dd-menu.open{display:block}
.sh-dd-item{padding:8px 12px;font-size:11px;font-weight:600;color:#0a1628;cursor:pointer;display:flex;align-items:center;gap:7px;border-bottom:1px solid rgba(30,111,217,.08)}
.sh-dd-item:last-child{border-bottom:none}
.sh-dd-item:hover{background:#f0f4ff}

/* TABLE */
.tbl-wrap{overflow-x:auto;overflow-y:auto;max-height:600px;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:14px;table-layout:fixed}
thead th{background:var(--navy);color:var(--gold2);padding:10px 14px;text-align:left;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;position:sticky;top:0;z-index:10}
thead th.r{text-align:right}
.tbl-cost thead th:first-child{width:28%}
.tbl-cost thead th:not(:first-child){width:14.4%}
.tbl-vendor thead th:nth-child(1){width:12%}
.tbl-vendor thead th:nth-child(2){width:16%}
.tbl-vendor thead th:nth-child(3){width:56%}
.tbl-vendor thead th:nth-child(4){width:16%}
tbody td.num{text-align:right;white-space:nowrap}
tbody tr:hover td{background:var(--blue-pale)}

/* CAT ROW */
tr.cat-row{cursor:pointer}
tr.cat-row td{background:#fff;color:var(--navy);font-weight:700;font-size:14px;padding:10px 14px;border-bottom:1px solid var(--border)}
tr.cat-row:not(.expanded) td.num{font-size:13px;font-weight:600;color:var(--navy)}
tr.cat-row:not(.expanded) td.num.blue{color:#1e6fd9;font-size:13px;font-weight:700}
tr.cat-row:not(.expanded) td.num.bud{color:var(--navy);font-size:13px;font-weight:700}
tr.cat-row:not(.expanded) td.num.green{color:#15803d;font-size:13px;font-weight:700}
tr.cat-row:not(.expanded) td.num.red{color:#f75151;font-size:13px;font-weight:700}
tr.cat-row:not(.expanded) td.num.gold{color:#c9970a;font-size:13px;font-weight:700}
tr.cat-row.expanded td.num{visibility:hidden}

/* DETAIL ROWS */
tr.detail-row{display:none}
tr.detail-row td{background:#f8faff;font-size:12px;color:#000;font-weight:500;padding:8px 14px;border-bottom:1px solid var(--border)}
tr.detail-row td:first-child{padding-left:36px}
tr.detail-row td.num{text-align:right}
tr.detail-row td.num.bud{color:#0a1628}
tr.detail-row td.num.blue{color:#1e6fd9}
tr.detail-row td.num.green{color:#15803d}
tr.detail-row td.num.red{color:#f75151}
tr.detail-row td.num.gold{color:#c9970a}
tr.detail-row.co-row td{background:#fffbeb}
tr.detail-row.over-row td{background:#fff5f5}

/* SUBTOTAL ROW */
tr.sub-row{display:none}
tr.sub-row td{background:var(--navy2);font-size:12px;font-weight:700;color:var(--gold2);padding:9px 14px;border-top:1px solid var(--navy);border-bottom:2px solid var(--gold)}
tr.sub-row td.num{text-align:right;color:var(--gold2)}
tr.sub-row td.num.bud{color:#ffffff}
tr.sub-row td.num.blue{color:#3b8ff5}
tr.sub-row td.num.green{color:#6ee7b7}
tr.sub-row td.num.red{color:#fca5a5}
tr.sub-row td.num.gold{color:#f0c040}
tr.sub-row td:first-child{padding-left:32px}

/* TOTALS */
tr.totals-row td{background:var(--navy);color:var(--gold2);font-weight:700;font-size:12px;padding:10px 14px;border-bottom:none}
tr.totals-row td.num{text-align:right;color:var(--gold2)}
tr.totals-row td.num.bud{color:#ffffff}
tr.totals-row td.num.blue{color:#3b8ff5}
tr.totals-row td.num.green{color:#6ee7b7}
tr.totals-row td.num.red{color:#fca5a5}
tr.totals-row td.num.gold{color:#f0c040}
tr.markup-row td{background:#fff;font-size:12px;color:#000;font-weight:500;padding:8px 14px;border-bottom:1px solid var(--border)}
tr.markup-row td.num{text-align:right;color:#000;font-weight:500}
tr.markup-row td.num.blue{color:#000}
tr.markup-row td.num.green{color:#000}
tr.markup-row td.num.red{color:#000}
tr.markup-row td.num.gold{color:#000}

/* TAGS */
.co-tag{display:inline-flex;align-items:center;font-size:13px;color:var(--gold-dark);background:var(--gold-light);padding:1px 7px;border-radius:4px;font-weight:600;border:1px solid #fcd34d}
.over-tag{display:inline-flex;align-items:center;font-size:13px;color:var(--red-dark);background:var(--red-light);padding:1px 7px;border-radius:4px;font-weight:600}
.invoice-num{font-size:12px;color:#000;padding:1px 6px}

/* EXPAND BTN */
.exp-btn{background:none;border:none;cursor:pointer;font-size:11px;color:var(--gray4);padding:0;margin-right:8px;transition:transform .18s;display:inline-block;vertical-align:middle}
.exp-btn.open{transform:rotate(90deg)}

/* VENDOR GROUP */
tr.vendor-row{cursor:pointer}
tr.vendor-row td{background:#fff;color:var(--navy);font-weight:700;font-size:14px;padding:10px 14px;border-bottom:1px solid var(--border)}
tr.vendor-row:not(.expanded) td.num{font-size:12px;font-weight:600;color:#000}
tr.vendor-row.expanded td.num{visibility:hidden}
tr.vendor-detail{display:none}
tr.vendor-detail td{background:#f8faff;font-size:12px;color:#000;font-weight:500;padding:8px 14px;border-bottom:1px solid var(--border)}
tr.vendor-detail td:first-child{padding-left:32px}
tr.vendor-detail td.num{text-align:right}
tr.vendor-sub{display:none}
tr.vendor-sub td{background:var(--navy2);font-size:12px;font-weight:700;color:var(--gold2);padding:9px 14px;border-top:1px solid var(--navy);border-bottom:2px solid var(--gold)}
tr.vendor-sub td.num{text-align:right;color:var(--gold2)}
tr.vendor-sub td:first-child{padding-left:28px}

/* TIMESHEET GROUP */
tr.ts-group-row{cursor:pointer}
tr.ts-group-row td{background:#fff;color:var(--navy);font-weight:700;font-size:14px;padding:10px 14px;border-bottom:1px solid var(--border)}
tr.ts-group-row:not(.expanded) td.num{font-size:13px;font-weight:600;color:#000}
tr.ts-group-row.expanded td.num{visibility:hidden}
tr.ts-detail{display:none}
tr.ts-detail td{background:#f8faff;font-size:12px;color:#000;font-weight:500;padding:8px 14px;border-bottom:1px solid var(--border)}
tr.ts-detail td:first-child{padding-left:28px;font-size:12px;color:#000}
tr.ts-detail td.name{font-weight:600;color:#000}
tr.ts-detail td.num{text-align:right;font-weight:500;color:#000}
/* FIX #2: ts-sub-row needs its own style matching vendor-sub styling */
tr.ts-sub-row{display:none}
tr.ts-sub-row td{background:var(--navy2);font-size:12px;font-weight:700;color:var(--gold2);padding:9px 14px;border-top:1px solid var(--navy);border-bottom:2px solid var(--gold)}
tr.ts-sub-row td.num{text-align:right;color:#ffffff}
tr.ts-sub-row td:first-child{padding-left:32px}
tr.ts-total-row td{background:var(--navy);color:var(--gold2);font-weight:700;font-size:13px;padding:10px 14px}
tr.ts-total-row td.num{text-align:right;color:#ffffff}

/* SCHEDULE */
.phase-wrap{padding:0}
.phase-row{display:flex;align-items:center;gap:12px;padding:10px 18px;border-bottom:.5px solid #eaf0fb}
.phase-row:last-child{border-bottom:none}
.phase-row:nth-child(even){background:#f5f9ff}
.phase-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.phase-name{font-size:13px;font-weight:600;color:var(--navy);width:200px;flex-shrink:0}
.phase-track{flex:1;height:20px;background:#f1f5f9;border-radius:5px;overflow:hidden;position:relative}
.phase-fill{height:100%;border-radius:5px;display:flex;align-items:center;padding:0 9px;transition:width .6s ease}
.phase-pct{font-size:9px;font-weight:800;color:#fff;white-space:nowrap}
.phase-sched{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:9px;color:#94a3b8;font-weight:600;letter-spacing:.3px}
.phase-dates{font-size:10px;color:#8fadc9;width:140px;text-align:right;flex-shrink:0;font-family:var(--mono)}
.sched-kpi-phase{border-top:3px solid var(--blue)!important}
.sched-kpi-comp{border-top:3px solid var(--navy)!important}
.sched-phase-val{font-size:22px;font-weight:800;color:var(--blue);margin-bottom:3px}
.sched-comp-val{font-size:36px;font-weight:800;color:var(--navy);line-height:1.05;margin-bottom:3px}

/* LEGEND */
.legend{display:flex;gap:16px;padding:10px 18px;border-bottom:1px solid var(--border);font-size:11px;color:var(--text2);flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:5px}
.leg-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}

/* CALENDAR */
.cal-card{background:var(--white);border-radius:var(--radius);box-shadow:var(--sh);border:1px solid var(--border);overflow:hidden}
.cal-head{display:flex;align-items:center;justify-content:space-between;padding:11px 18px;border-bottom:3px solid var(--gold);background:var(--navy2)}
.cal-head-title{font-size:11px;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:.8px}
.cal-nav{display:flex;align-items:center;gap:8px}
.cal-nav-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;padding:4px 12px;border-radius:4px;cursor:pointer;font-size:12px;transition:all .15s}
.cal-nav-btn:hover{background:rgba(240,192,64,.2);border-color:var(--gold2)}
#cal-month-label{font-size:12px;font-weight:700;color:var(--gold2);min-width:130px;text-align:center}
.cal-dow{display:grid;grid-template-columns:repeat(7,1fr);background:var(--navy)}
.cal-dow div{text-align:center;font-family:var(--mono);font-size:10px;font-weight:600;color:rgba(255,255,255,.5);padding:8px 2px;letter-spacing:.5px}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-week{position:relative}
.cal-week-row{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-bars{position:absolute;left:0;top:24px;width:100%;pointer-events:none}
.cal-bar{position:absolute;height:16px;font-size:10px;font-weight:500;color:#fff;padding:1px 6px;border-radius:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;pointer-events:auto;cursor:pointer;box-sizing:border-box}
.cal-legend{display:flex;flex-wrap:wrap;gap:14px;padding:10px 18px;border-top:1px solid var(--border);font-size:11px;color:var(--text2)}
.cal-legend-item{display:flex;align-items:center;gap:6px}
.cal-legend-dot{width:9px;height:9px;border-radius:2px;flex-shrink:0}
.cal-day{min-height:80px;padding:7px 8px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);background:#fff}
.cal-day:nth-child(7n){border-right:none}
.cal-day.other-month{background:#f8faff;opacity:.5}
.cal-day.today-cell{background:#fff;border-top:none}.cal-day.has-tasks{cursor:pointer}
.cal-day.has-tasks:hover{background:var(--blue-pale)}
.cal-day-num{font-size:13px;font-weight:700;color:#000;margin-bottom:4px;text-align:right}
.today-cell .cal-day-num{background:var(--blue);color:#fff;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;margin-left:auto;margin-bottom:4px}
.task-pip{font-size:10px;font-weight:500;padding:2px 6px;border-radius:3px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cal-popup{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;border-radius:var(--radius);box-shadow:0 8px 40px rgba(10,22,40,.25);border:1px solid var(--border);width:340px;z-index:500;overflow:hidden}
.cal-popup.open{display:block}
.cal-popup-hdr{background:var(--navy2);padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.cal-popup-close{background:none;border:none;color:rgba(255,255,255,.6);cursor:pointer;font-size:16px}
.cal-popup-body{padding:12px 16px;max-height:260px;overflow-y:auto}
.cal-popup-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.cal-popup-item:last-child{border-bottom:none}
/* FIX #13: overlay for outside-click close */
.cal-popup-overlay{display:none;position:fixed;inset:0;z-index:499}
.cal-popup-overlay.open{display:block}

/* NO DATA */
.no-data{padding:48px;text-align:center;color:var(--gray4)}
.no-data-icon{font-size:40px;opacity:.25;margin-bottom:12px}
.no-data-title{font-size:.9rem;font-weight:700;margin-bottom:6px}
.no-data-sub{font-family:var(--mono);font-size:.62rem;line-height:1.9}

/* PRINT / PDF */
@media print{
  .hdr{position:static!important}
  .tabs-bar{display:none!important}
  .tab-panel{display:block!important}
  .tab-panel:not(.active){display:none!important}
  .btn,.cal-nav-btn,.cal-popup{display:none!important}
}

/* RESPONSIVE */
/* FIX #14: show at least client name on tablet/mobile */
@media(max-width:900px){
  .kpi-grid.cols-4,.kpi-grid.cols-3{grid-template-columns:repeat(2,1fr)}
  .tab-panel{padding:12px 14px 40px}
  .hdr-top{padding:10px 14px 8px}
  .tabs-bar{padding:0 10px}
  /* Only hide report period and project on tablet, keep client visible */
  .brand-sub-row:nth-child(2),.brand-sub-row:nth-child(3){display:none}
}
@media(max-width:600px){
  .kpi-grid.cols-4,.kpi-grid.cols-3,.kpi-grid.cols-2{grid-template-columns:1fr 1fr}
  .tab-panel{padding:10px 8px}
  .tab-btn{font-size:13px;padding:12px 11px}
  .kpi-val{font-size:20px}
  .budget-kpis{grid-template-columns:1fr}
  .phase-name{width:110px;font-size:11px}
  .phase-dates{width:72px;font-size:9px}
  .phase-track{display:none}
  .sched-comp-val{font-size:24px}
  /* Hide all brand-sub on very small screens */
  .brand-sub{display:none}
}
@media(max-width:768px){
  .sec-card table{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch;width:100%}
  thead th{padding:8px 6px;font-size:9px;white-space:nowrap}
  tbody td{padding:8px 6px;font-size:11px}
  tbody td.num{font-size:11px;white-space:nowrap}
}
</style>

<body>

<div class="hdr">
  <div class="hdr-top">
    <div class="brand">
      <div class="logo-badge">MM</div>
      <div class="brand-name">
        <h1>McMann Group Inc.</h1>
        <p>Project Cost Dashboard</p>
        <div class="brand-sub">
          <div class="brand-sub-row">
            <span class="brand-sub-label">Client</span>
            <span class="brand-sub-val" id="hdr-client">—</span>
          </div>
          <div class="brand-sub-row">
            <span class="brand-sub-label">Report Period</span>
            <span class="brand-sub-val" id="hdr-date">—</span>
          </div>
          <div class="brand-sub-row">
            <span class="brand-sub-label">Project</span>
            <span class="brand-sub-val" id="hdr-job">—</span>
          </div>
        </div>
      </div>
    </div>
    <div class="hdr-right">
    </div>
  </div>
  <div class="tabs-bar">
    <button class="tab-btn active" onclick="showTab('cost',this)">Cost Breakdown</button>
    <button class="tab-btn" onclick="showTab('timesheet',this)">Timesheet</button>
    <button class="tab-btn" onclick="showTab('vendors',this)">Vendors</button>
    <button class="tab-btn" onclick="showTab('schedule',this)">Schedule</button>
    <button class="tab-btn" onclick="showTab('calendar',this)">Calendar</button>
  </div>
</div>

<div class="tab-panel active" id="tab-cost"><div class="loading"><div class="loading-spinner"></div><div class="loading-text">Loading...</div></div></div>
<div class="tab-panel" id="tab-timesheet"></div>
<div class="tab-panel" id="tab-vendors"></div>
<div class="tab-panel" id="tab-schedule"></div>
<div class="tab-panel" id="tab-calendar"></div>

<!-- FIX #13: overlay closes popup on outside click -->
<div class="cal-popup-overlay" id="cal-popup-overlay" onclick="closeCalPopup()"></div>
<div class="cal-popup" id="cal-popup">
  <div class="cal-popup-hdr">
    <span id="cal-popup-title" style="font-size:12px;font-weight:700;color:#fff"></span>
    <button class="cal-popup-close" onclick="closeCalPopup()">×</button>
  </div>
  <div class="cal-popup-body" id="cal-popup-body"></div>
</div>

<script>
// ── GLOBALS ──
var D = null;
var _activeTab = 'cost';
var _calYear = new Date().getFullYear();
var _calMonth = new Date().getMonth();
var _calItems = [];
var GROUP_COLORS={'Pre-Construction':'#6b7280','Excavation':'#f0a55a','Foundation':'#1e8e5a','Framing':'#8a5a3a','Windows & Doors':'#4a90d9','Electrical':'#6c63d6','Plumbing':'#d6437a','HVAC/Mechanical':'#8bc34a','Insulation & Drywall':'#0f6e56','Roofing':'#d8602f','Exterior Veneer':'#9b59b6','Cabinetry & Countertops':'#e8a23a','Interior Finishing':'#5a8a8a','Tile':'#3aa6a0','Wood Floor Coverings':'#a0763a','Paint':'#c0566e','Masonry':'#7a7a52','Exterior Hardscape':'#5a8a3a','Construction Clean Up':'#999','Jobsite Facilities':'#777'};
function groupColor(g){return GROUP_COLORS[g]||'#888780';}
var _MOS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

// ── HELPERS ──
// FIX #12: unified currency formatter — always show positive amounts cleanly.
// Callers that want to show negative values pass a negative number;
// callers that already have Math.abs() pass a positive.  No double-wrapping.
function fC(v){
  if(v===null||v===undefined||v==='')return'—';
  var n=parseFloat(v);
  if(isNaN(n))return v;
  if(n<0)return'($'+Math.abs(n).toLocaleString('en-CA',{minimumFractionDigits:2,maximumFractionDigits:2})+')';
  return'$'+n.toLocaleString('en-CA',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function fCabs(v){
  // Always formats as positive dollar amount — use for "Over Budget" display
  var n=parseFloat(v)||0;
  return'$'+Math.abs(n).toLocaleString('en-CA',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function $(id){return document.getElementById(id)}
function setText(id,val){var el=$(id);if(el)el.textContent=val}

// ── TABS ──
function showTab(id,btn){
  document.querySelectorAll('.tab-panel').forEach(function(p){p.classList.remove('active')});
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active')});
  $('tab-'+id).classList.add('active');
  btn.classList.add('active');
  _activeTab=id;
  if(id==='calendar')buildCalDays();
}

// ── TOGGLE GROUP ──
// FIX #1 (vendor visibility), FIX #2 (ts-sub-row ID)
function toggleGroup(id,type){
  var btn=$('exp-'+id);
  if(!btn)return;
  var isOpen=btn.classList.contains('open');
  btn.classList.toggle('open',!isOpen);
  var catRow=$(type+'-cat-'+id);
  if(catRow)catRow.classList.toggle('expanded',!isOpen);
var filterId=type==='vs'?'v-filter':'ts-filter';
  var activeFilterEl=document.getElementById(filterId);
  var activeMonth=activeFilterEl?activeFilterEl.value:'all';
  document.querySelectorAll('[data-group="'+id+'"]').forEach(function(r){
    if(isOpen){
      r.style.display='none';
    } else if(type==='vs'){
      var matchAttr=r.getAttribute('data-month-match');
      r.style.display=(matchAttr===null?true:matchAttr==='1')?'table-row':'none';
    } else {
      var mo=r.getAttribute('data-month');
      r.style.display=(activeMonth==='all'||!mo||mo===activeMonth)?'table-row':'none';
    }
  });
// sub row: uses type prefix correctly for all three types
  var subRow=$(type+'-sub-'+id);
  if(subRow)subRow.style.display=isOpen?'none':'table-row';
  // timesheet: hide group total when expanded, and recalc it from visible rows
  var tsNum=$('ts-num-'+id);
  if(tsNum)tsNum.style.visibility=isOpen?'visible':'hidden';
  if(type==='ts'){
    var tsSum=0;
    document.querySelectorAll('[data-group="'+id+'"].ts-detail').forEach(function(r){
      var rMo=r.getAttribute('data-month');
      var rMatches=(activeMonth==='all'||!rMo||rMo===activeMonth);
      if(rMatches)tsSum+=parseFloat(r.querySelector('.num').textContent)||0;
    });
    if(tsNum)tsNum.textContent=tsSum.toFixed(2);
    if(subRow){var subNum=subRow.querySelector('.num');if(subNum)subNum.textContent=tsSum.toFixed(2);}
  }
  // FIX #1: vendor total — visible when CLOSED, hidden when OPEN (was inverted)
  var vsNum=$('vs-num-'+id);
  if(vsNum)vsNum.style.visibility=isOpen?'visible':'hidden';
}

// ── LOAD DATA ──
function loadData(){
  fetch('/data.json?v='+Date.now())
    .then(function(r){return r.json()})
    .then(function(data){D=data;renderAll(data);})
    .catch(function(e){
      console.error('Load failed',e);
      $('tab-cost').innerHTML='<div class="no-data"><div class="no-data-icon">⚠</div><div class="no-data-title">Could not load data</div><div class="no-data-sub">Check data.json exists on the server</div></div>';
    });
}

// ── EXPORT PDF ──
function exportPDF(expanded,tab){
  if(!D)return;
  var savedTab=_activeTab;
  if(tab)_activeTab=tab;
  if(_activeTab==='schedule'||_activeTab==='calendar'){_activeTab=savedTab;return;}
  var trigId='sh-pdf-dd-'+_activeTab;
  var trigEl=$(trigId);
  if(trigEl){trigEl.textContent='Generating...';trigEl.disabled=true;}
  function done(){
    _activeTab=savedTab;
    if(trigEl){trigEl.disabled=false;trigEl.innerHTML='&#8595; Export PDF &nbsp;&#9660;';}
  }

  var tabNames={cost:'Cost Breakdown',timesheet:'Timesheet',vendors:'Vendors'};
  var jobName=D.job||'McMann';
  var client=D.client||'';
  var period=D.reportLabel||'';
  var tabName=tabNames[_activeTab]||_activeTab;
  var dateStr=new Date().toLocaleDateString('en-CA');
  var filename=jobName.replace(/\s+/g,'_')+'_'+tabName+'_'+(expanded?'expanded':'collapsed')+'_'+dateStr.replace(/\//g,'-')+'.pdf';

  // ── PAGE SETUP — Letter landscape ──
  var pw=279, ph=216;
  var ml=8, mr=8, mt=8, mb=8;
  var usableW=pw-ml-mr; // 263mm
  var usableH=ph-mt-mb; // 200mm

  var doc=new window.jspdf.jsPDF({orientation:'landscape',unit:'mm',format:'letter'});

  var NAVY='#0a1628', NAVY2='#112240', GOLD='#f0c040', WHITE='#ffffff';
  var BLUE='#1e6fd9', GREEN='#15803d', AMBER='#c9970a';
  var ROW_LIGHT='#ffffff', ROW_DETAIL='#f8faff', ROW_SUB=NAVY2, ROW_TOTAL=NAVY;
  var TEXT_DARK='#0a1628', TEXT_MID='#3d5a8a';

  function hexToRgb(h){
    var r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);
    return[r,g,b];
  }
  function setFill(hex){var c=hexToRgb(hex);doc.setFillColor(c[0],c[1],c[2]);}
  function setTxt(hex){var c=hexToRgb(hex);doc.setTextColor(c[0],c[1],c[2]);}
  function setDraw(hex){var c=hexToRgb(hex);doc.setDrawColor(c[0],c[1],c[2]);}

  // ── COLUMN DEFINITIONS ──
  var cols;
  if(_activeTab==='cost'){
    // Use the schema from data.json so PDF matches what admin configured
    var _pdfSchemaCols=getClientCols(D);
    var _pdfVisCols=_pdfSchemaCols.filter(function(c){return c.visible!==false;});
    // Distribute width: label col gets more space, numeric cols share the rest
    var _numColCount=_pdfVisCols.filter(function(c){return c.key!=='label';}).length;
    var _labelW=Math.max(50,usableW-(_numColCount*27));
    var _numW=_numColCount>0?Math.floor((usableW-_labelW)/_numColCount):27;
    cols=_pdfVisCols.map(function(c){
      return{label:c.label,w:c.key==='label'?_labelW:_numW,align:c.key==='label'?'left':'right',_key:c.key};
    });
  } else if(_activeTab==='timesheet'){
    cols=[
      {label:'Date',         w:40,  align:'left'},
      {label:'Staff Member', w:80,  align:'left'},
      {label:'Notes',        w:100, align:'left'},
      {label:'Hours',        w:43,  align:'right'}
    ];
  } else {
    cols=[
      {label:'Date',                  w:28,  align:'left'},
      {label:'Receipt #',             w:38,  align:'left'},
      {label:'Vendor / Description',  w:145, align:'left'},
      {label:'Amount',                w:52,  align:'right'}
    ];
  }

  // ── ROW HEIGHTS ──
  var H_HDR1  = 13;
  // FIX #5: only add KPI height when on cost tab
  var H_KPI   = (_activeTab==='cost') ? 20 : 0;
  var H_CONT  = 9;
  var H_COLHDR= 8;
  var H_ROW   = 7;
  var H_SUB   = 7;
  var H_TOTAL = 8;
  // FIX #4: pageBottom uses only the real bottom margin + 1 row for page number
  var PAGE_BOTTOM = ph - mb - H_ROW;

  // ── DRAW HELPERS ──
  function drawRect(x,y,w,h,fill){
    setFill(fill);
    doc.rect(x,y,w,h,'F');
  }
  function drawText(text,x,y,opts){
    opts=opts||{};
    if(text===null||text===undefined)text='';
    text=String(text);
    if(text.trim()==='')return;
    doc.setFontSize(opts.size||9);
    doc.setFont('helvetica',opts.bold?'bold':'normal');
    setTxt(opts.color||TEXT_DARK);
    if(opts.align==='right'){
      doc.text(text,x,y,{align:'right'});
    } else {
      doc.text(text,x,y);
    }
  }

  function drawHeader1(){
    var x=ml, y=mt;
    drawRect(x,y,usableW,H_HDR1,NAVY);
    drawRect(x+2,y+1.5,9,9,'#c9970a');
    drawText('MM',x+3.2,y+8,{size:7,bold:true,color:NAVY});
    drawText('McMann Group Inc. — '+tabName,x+13,y+6.5,{size:11,bold:true,color:WHITE});
    drawText(client+(period?' · '+period:''),x+13,y+11,{size:8,color:GOLD});
    drawText(dateStr,ml+usableW-2,y+7,{size:8,color:'#aaaaaa',align:'right'});
    return y+H_HDR1;
  }

  function drawKPI(y){
    if(_activeTab!=='cost'||!D.costBreakdown)return y;
    var tots=D.costBreakdown.totals||[];
    var pt=tots.find(function(t){return t.label==='PROJECT TOTAL';})||{};
    var kpiW=usableW/3-2;
    var kpis=[
      {label:'INVOICED',     val:fC(pt.totInv), color:BLUE,  bg:'#eff6ff', border:BLUE},
      {label:'REMAINING',    val:fC(pt.tbc),    color:GREEN, bg:'#f0fdf4', border:GREEN},
      {label:'CHANGE ORDERS',val:fC(pt.co),     color:AMBER, bg:'#fffbeb', border:AMBER}
    ];
    kpis.forEach(function(k,i){
      var kx=ml+(kpiW+3)*i;
      drawRect(kx,y,kpiW,H_KPI,k.bg);
      var bc=hexToRgb(k.border);
      doc.setFillColor(bc[0],bc[1],bc[2]);
      doc.rect(kx,y,1.5,H_KPI,'F');
      drawText(k.label,kx+4,y+7,{size:7,bold:true,color:k.color});
      drawText(k.val,kx+4,y+15,{size:13,bold:true,color:k.color});
    });
    return y+H_KPI;
  }

  function drawContHeader(pageNum){
    var y=mt;
    drawRect(ml,y,usableW,H_CONT,NAVY2);
    drawRect(ml+2,y+1,7,7,'#c9970a');
    drawText('MM',ml+3,y+6.2,{size:6,bold:true,color:NAVY});
    drawText('McMann Group Inc. — '+tabName+' (continued)',ml+11,y+6,{size:9,bold:true,color:GOLD});
    drawText(dateStr,ml+usableW-2,y+7,{size:8,color:'#aaaaaa',align:'right'});
    return y+H_CONT;
  }

  function drawColHeaders(y){
    drawRect(ml,y,usableW,H_COLHDR,NAVY);
    var x=ml;
    cols.forEach(function(col){
      var tx=col.align==='right'?x+col.w-1:x+2;
      drawText(col.label,tx,y+5.5,{size:8,bold:true,color:GOLD,align:col.align});
      x+=col.w;
    });
    setDraw(GOLD);
    doc.setLineWidth(0.4);
    doc.line(ml,y+H_COLHDR,ml+usableW,y+H_COLHDR);
    return y+H_COLHDR;
  }

  function drawPageNum(pageNum,totalPages){
    setTxt('#888888');
    doc.setFontSize(8);
    doc.setFont('helvetica','normal');
    doc.text('Page '+pageNum+' of '+totalPages,pw/2,ph-mb-2,{align:'center'});
  }

  function drawRow(row,y){
    var h=row.isTotal?H_TOTAL:row.isSub?H_SUB:row.isMarkup?H_ROW:H_ROW;
    var bg=row.isTotal?ROW_TOTAL:row.isSub?ROW_SUB:row.isMarkup?ROW_LIGHT:row.isDetail?ROW_DETAIL:ROW_LIGHT;
    drawRect(ml,y,usableW,h,bg);
    if(row.isSub||row.isTotal){
      setDraw(GOLD);doc.setLineWidth(0.3);doc.line(ml,y+h,ml+usableW,y+h);
    } else {
      setDraw('#e2e8f0');doc.setLineWidth(0.1);doc.line(ml,y+h,ml+usableW,y+h);
    }
    var x=ml;
    row.cells.forEach(function(cell,ci){
      var col=cols[ci];
      if(!col)return;
      var indent=(row.isDetail&&ci===0)?4:row.isMarkup&&ci===0?4:0;
      var tx=col.align==='right'?x+col.w-1:x+2+indent;
      var sz=row.isTotal||row.isSub?8:row.isCat?9:8;
      var bold=row.isTotal||row.isSub||row.isCat;
      var color=row.isTotal||row.isSub?GOLD:cell.color||TEXT_DARK;
      if((row.isSub||row.isTotal)&&ci===1)color=WHITE;
      if((row.isSub||row.isTotal)&&(ci===2||ci===3||ci===4))color='#7ab8f5';
      if((row.isSub||row.isTotal)&&ci===5)color='#6ee7b7';
      if((row.isSub||row.isTotal)&&ci===6&&cell.text&&cell.text!=='—')color='#fca5a5';
      if((row.isSub||row.isTotal)&&ci===7&&cell.text&&cell.text!=='—')color='#f0c040';
      if(row.isMarkup)color=TEXT_DARK;
      drawText(cell.text||'',tx,y+h/2+2,{size:sz,bold:bold,color:color,align:col.align});
      x+=col.w;
    });
    return h;
  }

  // ── BUILD ROW DATA ──
  function buildCostRows(){
    var rows=[];
    var cb=D.costBreakdown||{};
    var cats=cb.categories||[];
    var tots=cb.totals||[];
    // Get the PDF schema columns (already computed above as cols)
    var _pdfCols=cols.filter(function(c){return c._key&&c._key!=='label';});
    function cellForKey(key,item){
      var v=item[key]||0;
      if(key==='ob')return{text:v<0?fCabs(v):'—',color:v<0?'#ef4444':TEXT_MID};
      if(key==='co')return{text:v>0?fC(v):'—',color:v>0?AMBER:TEXT_MID};
      if(key==='tbc')return{text:fC(v),color:v>0?GREEN:v<0?'#ef4444':TEXT_DARK};
      if(key==='budget')return{text:fC(v)};
      return{text:fC(v),color:BLUE};
    }

    cats.forEach(function(cat){
      var sub=cat.subtotal||{};
      var group=[];

      group.push({isCat:true,cells:[
        {text:cat.label}
      ].concat(_pdfCols.map(function(col){
        var v=sub[col._key]||0;
        return expanded?{text:''}:cellForKey(col._key,sub);
      }))});

      if(expanded){
        cat.items.forEach(function(item){
          group.push({isDetail:true,cells:[
            {text:item.label}
          ].concat(_pdfCols.map(function(col){return cellForKey(col._key,item);}))});
        });
        group.push({isSub:true,cells:[
          {text:'Subtotal — '+cat.label}
        ].concat(_pdfCols.map(function(col){return{text:fC(sub[col._key]||0)};}))});
      }

      rows.push(group);
    });

    tots.forEach(function(t){
      var isMarkup=(t.label!=='Project Subtotal'&&t.label!=='PROJECT TOTAL');
      rows.push([{isTotal:!isMarkup,isMarkup:isMarkup,cells:[
        {text:t.label}
      ].concat(_pdfCols.map(function(col){return{text:fC(t[col._key]||0)};}))}]);
    });

    return rows;
  }

  // ── PAGINATION ENGINE ──
  function countPages(groups){
    var page=1;
    var y=mt+H_HDR1+H_KPI+H_COLHDR; // FIX #5: H_KPI is 0 for non-cost tabs
    groups.forEach(function(group){
      var groupH=group.reduce(function(sum,row){
        return sum+(row.isTotal?H_TOTAL:row.isSub?H_SUB:H_ROW);
      },0);
      if(y+groupH>PAGE_BOTTOM){page++;y=mt+H_CONT+H_COLHDR;}
      y+=groupH;
    });
    return page;
  }

  function paginate(groups,totalPages){
    var page=1;
    var y=drawHeader1();
    y=drawKPI(y);
    y=drawColHeaders(y);

    var firstGroup=true;
    groups.forEach(function(group){
      var groupH=group.reduce(function(sum,row){
        return sum+(row.isTotal?H_TOTAL:row.isSub?H_SUB:H_ROW);
      },0);

      if(!firstGroup&&y+groupH>PAGE_BOTTOM){
        drawPageNum(page,totalPages);
        doc.addPage();
        page++;
        y=drawContHeader(page);
        y=drawColHeaders(y);
      }
      firstGroup=false;

      group.forEach(function(row){
        if(y+H_ROW>PAGE_BOTTOM){
          drawPageNum(page,totalPages);
          doc.addPage();
          page++;
          y=drawContHeader(page);
          y=drawColHeaders(y);
        }
        var h=drawRow(row,y);
        y+=h;
      });
    });
    drawPageNum(page,totalPages);
  }

  function buildTimesheetRows(){
    var rows=[];
    var ts=D.timesheet||{};
    var groups=ts.groups||[];
    groups.forEach(function(g){
      var group=[];
      group.push({isCat:true,cells:[
        {text:g.label},{text:''},{text:''},
        {text:expanded?'':g.total_hours.toFixed(2)+'h',color:BLUE}
      ]});
      if(expanded){
        g.items.forEach(function(item){
          var fmtD=(function(v){
            if(!v)return'—';
            var n=parseFloat(v);
            if(!isNaN(n)&&n>40000){
              var d=new Date((n-25569)*86400*1000);
              var mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
              return mo[d.getUTCMonth()]+' '+d.getUTCDate()+', '+d.getUTCFullYear();
            }
            var p=v.split(' ');
            return p.length>=3?p[0]+' '+p[1]+', '+p[2]:v;
          })(item.date);
          group.push({isDetail:true,cells:[
            {text:fmtD},{text:item.name||''},{text:item.status||''},
            {text:item.hours?item.hours.toFixed(2):'—'}
          ]});
        });
        group.push({isSub:true,cells:[
          {text:'Total — '+g.label},{text:''},{text:''},
          {text:g.total_hours.toFixed(2)+'h'}
        ]});
      }
      rows.push(group);
    });
    var totalH=ts.totalHours||0;
    rows.push([{isTotal:true,cells:[
      {text:'Total Hours'},{text:''},{text:''},
      {text:totalH.toFixed(2)+'h'}
    ]}]);
    return rows;
  }

  function buildVendorRows(){
    var rows=[];
    var mat=D.materials||{};
    var vendors=mat.vendors||[];
    vendors.forEach(function(v){
      var group=[];
      group.push({isCat:true,cells:[
        {text:v.name},{text:''},{text:''},
        {text:expanded?'':fC(v.total)}
      ]});
      if(expanded){
        v.bills.forEach(function(bill){
          var fmtD=(function(val){
            if(!val)return'—';
            var n=parseFloat(val);
            if(!isNaN(n)&&n>40000){
              var d=new Date((n-25569)*86400*1000);
              var mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
              return mo[d.getUTCMonth()]+' '+d.getUTCDate()+', '+d.getUTCFullYear();
            }
            return val;
          })(bill.date);
          group.push({isDetail:true,cells:[
            {text:fmtD},{text:bill.num||''},{text:bill.memo||''},{text:fC(bill.amount)}
          ]});
        });
        group.push({isSub:true,cells:[
          {text:'Subtotal — '+v.name},{text:''},{text:''},{text:fC(v.total)}
        ]});
      }
      rows.push(group);
    });
    var grandTotal=mat.grandTotal||0;
    rows.push([{isTotal:true,cells:[
      {text:'Total Vendor Spend'},{text:''},{text:''},{text:fC(grandTotal)}
    ]}]);
    return rows;
  }

  var groups=_activeTab==='cost'?buildCostRows():_activeTab==='timesheet'?buildTimesheetRows():buildVendorRows();
  var totalPages=countPages(groups);
  paginate(groups,totalPages);
  doc.save(filename);
  done();
}

  var schema=D&&D._schema&&D._schema.costBreakdown&&D._schema.costBreakdown.columns;

function renderTimesheet(ts){

    return;
  }
  var months={};

    g.items.forEach(function(item){
      if(!item.date)return;
      var n=parseFloat(item.date);

        var d=new Date((n-25569)*86400*1000);

        }
        var p=v.split(' ');
        return p.length>=3?p[0]+' '+p[1]+', '+p[2]:v;
      })(item.date);
      var mo=(function(v){
        if(!v)return'';
        var n=parseFloat(v);

          var d=new Date((n-25569)*86400*1000);
          var mos=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function filterTimesheet(){
  var val=document.getElementById('ts-filter').value;
  var grand=0;
  document.querySelectorAll('.ts-group-row').forEach(function(catRow){
    var gid=catRow.id.replace('ts-cat-','');
    var sum=0;
    document.querySelectorAll('[data-group="'+gid+'"].ts-detail').forEach(function(r){
      var mo=r.getAttribute('data-month');
      var show=(val==='all'||mo===val);
      r.style.display=show?'table-row':'none';
      if(show)sum+=parseFloat(r.querySelector('.num').textContent)||0;
    });
    var numEl=document.getElementById('ts-num-'+gid);
    if(numEl)numEl.textContent=sum.toFixed(2);
    var subRow=document.getElementById('ts-sub-'+gid);
    if(subRow){var subNum=subRow.querySelector('.num');if(subNum)subNum.textContent=sum.toFixed(2);}
    grand+=sum;
  });
  var totalRow=document.querySelector('.ts-total-row .num strong');
  if(totalRow)totalRow.textContent=grand.toFixed(2);
  var kpi=document.querySelector('.kpi-card.blue .kpi-val');
  if(kpi)kpi.textContent=grand.toFixed(2);
}

      months[mos[d.getUTCMonth()]+' '+d.getUTCFullYear()]=1;
    } else {
      var p=ab.bill.date.split(' ');
      if(p.length>=3)months[p[0]+' '+p[2]]=1;
    }
  });
  var monthList=Object.keys(months).sort(function(a,b){return new Date(a)-new Date(b)});

  var html='<div class="kpi-grid cols-1" style="max-width:340px">'
    +'<div class="kpi-card blue"><div class="kpi-lbl">Total Vendor Spend</div><div class="kpi-val">'+fC(grandTotal)+'</div><div class="kpi-sub">'+vendors.length+' vendors · '+allBills.length+' invoices</div></div>'
    +'</div>'
    +'<div class="sec-card">'
    +'<div class="sec-head"><div><h2>Vendor Summary</h2><p>Click a vendor to expand</p></div>'
    +'<div class="sec-head-right">'
    +'<div class="sh-dd-wrap"><button class="sh-btn" id="sh-pdf-dd-vendors" onclick="shTogglePDF(\'vendors\')">&#8595; Export PDF &#9660;</button><div class="sh-dd-menu" id="sh-pdf-menu-vendors"><div class="sh-dd-item" onclick="shClosePDF(\'vendors\');exportPDF(false,\'vendors\')">&#9633; Collapsed (groups only)</div><div class="sh-dd-item" onclick="shClosePDF(\'vendors\');exportPDF(true,\'vendors\')">&#9635; Expanded (all rows)</div></div></div>'
    +'<label style="font-size:11px;color:rgba(255,255,255,.6);font-weight:600">Filter:</label>'
    +'<select class="filter-sel" id="v-filter" onchange="filterVendors()">'
    +'<option value="all">All Months</option>'
    +monthList.map(function(m){return'<option value="'+m+'">'+m+'</option>'}).join('')
    +'</select></div></div>'
    +'<div class="sh-toolbar"><div class="sh-btn-group"><button onclick="shExpandAll(\'vs\')">&#9660; Expand All</button><button onclick="shCollapseAll(\'vs\')">&#9650; Collapse All</button></div></div>'
    +'<div class="tbl-wrap"><table class="tbl-vendor">'
    +'<thead><tr><th style="width:12%">Date</th><th style="width:16%">Receipt #</th><th style="width:56%">Vendor / Description</th><th class="r" style="width:16%">Amount</th></tr></thead>'
    +'<tbody>';

  vendors.forEach(function(v,vi){
    var vid='vnd'+vi;
    html+='<tr class="vendor-row" id="vs-cat-'+vid+'" onclick="toggleGroup(\''+vid+'\',\'vs\')">'
      +'<td colspan="3"><button class="exp-btn" id="exp-'+vid+'">▶</button><strong>'+v.name+'</strong><span style="font-size:10px;color:var(--gray4);margin-left:10px">'+v.bills.length+' invoice'+(v.bills.length>1?'s':'')+'</span></td>'
      +'<td class="num" id="vs-num-'+vid+'">'+fC(v.total)+'</td>'
      +'</tr>';
    v.bills.forEach(function(bill){
      var fmtBillDate=(function(v){
        if(!v)return'—';
        var n=parseFloat(v);
        if(!isNaN(n)&&n>40000){
          var d=new Date((n-25569)*86400*1000);
          var mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
          return mo[d.getUTCMonth()]+' '+d.getUTCDate()+', '+d.getUTCFullYear();
        }
        return v;
      })(bill.date);
      var rawMo=(function(v){
        if(!v)return'';
        var n=parseFloat(v);
        if(!isNaN(n)&&n>40000){
          var d=new Date((n-25569)*86400*1000);
          var mos=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
          return mos[d.getUTCMonth()]+' '+d.getUTCFullYear();
        }
        var p=v.split(' ');return p.length>=3?p[0]+' '+p[2]:'';
      })(bill.date);
      html+='<tr class="vendor-detail" data-group="'+vid+'" data-month="'+rawMo+'">'
        +'<td style="font-size:12px;color:#000">'+fmtBillDate+'</td>'
        +'<td style="font-size:12px;color:#000">'+bill.num+'</td>'
        +'<td style="font-size:12px;color:#000">'+bill.memo+'</td>'
        +'<td class="num">'+fC(bill.amount)+'</td></tr>';
    });
    html+='<tr class="vendor-sub" id="vs-sub-'+vid+'" data-group="'+vid+'">'
      +'<td colspan="3">Subtotal — '+v.name+'</td>'
      +'<td class="num">'+fC(v.total)+'</td>'
      +'</tr>';
  });

  html+='<tr class="ts-total-row"><td colspan="3"><strong>Total Vendor Spend &nbsp;·&nbsp; '+vendors.length+' vendors &nbsp;·&nbsp; '+allBills.length+' invoices</strong></td><td class="num"><strong>'+fC(grandTotal)+'</strong></td></tr>'
    +'</tbody></table></div></div>';
  $('tab-vendors').innerHTML=html;
}

// FIX #3: filterVendors resets vendor-row visibility when switching to All Months
function filterVendors(){
  var val=document.getElementById('v-filter').value;
  document.querySelectorAll('[id^="exp-vnd"]').forEach(function(btn){
    btn.classList.remove('open');
  });
  document.querySelectorAll('.vendor-row').forEach(function(row){
    row.classList.remove('expanded');
  });
  document.querySelectorAll('.vendor-detail').forEach(function(r){
    var mo=r.getAttribute('data-month');
    var matches=(val==='all'||mo===val);
    r.setAttribute('data-month-match',matches?'1':'0');
    r.style.display='none';
  });
  var grandFiltered=0,visibleVendorCount=0,visibleBillCount=0;
  document.querySelectorAll('.vendor-row').forEach(function(row){
    var grp=row.id.replace('vs-cat-','');
    var details=document.querySelectorAll('.vendor-detail[data-group="'+grp+'"]');
    var anyMatch=false,vendorSum=0,vendorBillCount=0;
    details.forEach(function(r){
      if(r.getAttribute('data-month-match')==='1'){
        anyMatch=true;
        vendorBillCount++;
        var amtCell=r.querySelector('td.num');
        var amt=amtCell?parseFloat(amtCell.textContent.replace(/[^0-9.-]/g,'')):0;
        if(!isNaN(amt))vendorSum+=amt;
      }
    });
    var sub=document.getElementById('vs-sub-'+grp);
    var numCell=document.getElementById('vs-num-'+grp);
    row.style.display='table-row';
    if(val!=='all'&&!anyMatch){row.style.display='none';}
    if(sub)sub.style.display='none';
    if(anyMatch){
      visibleVendorCount++;
      visibleBillCount+=vendorBillCount;
      grandFiltered+=vendorSum;
      if(numCell){numCell.textContent=fC(vendorSum);numCell.style.visibility='visible';}
      var subCell=sub?sub.querySelector('td.num'):null;
      if(subCell)subCell.textContent=fC(vendorSum);
    }
  });
  var kpiVal=document.querySelector('#tab-vendors .kpi-val');
  var kpiSub=document.querySelector('#tab-vendors .kpi-sub');
  if(kpiVal)kpiVal.textContent=fC(grandFiltered);
  if(kpiSub)kpiSub.textContent=visibleVendorCount+' vendors · '+visibleBillCount+' invoices';
  var totalRow=document.querySelector('#tab-vendors .ts-total-row td.num strong');
  var totalRowLabel=document.querySelector('#tab-vendors .ts-total-row td strong');
  if(totalRow)totalRow.textContent=fC(grandFiltered);
  if(totalRowLabel)totalRowLabel.innerHTML='Total Vendor Spend &nbsp;·&nbsp; '+visibleVendorCount+' vendors &nbsp;·&nbsp; '+visibleBillCount+' invoices';
}

// ── SCHEDULE ──
// FIX #9: check multiple "done" status values from Monday.com
var DONE_STATUSES=['done','complete','completed'];
function isDone(status){
  return DONE_STATUSES.indexOf((status||'').toLowerCase().trim())>-1;
}

function renderSchedule(items){
  _calItems=items;
  if(!items||!items.length){
    $('tab-schedule').innerHTML='<div class="no-data"><div class="no-data-icon">📅</div><div class="no-data-title">No schedule data</div><div class="no-data-sub">Schedule syncs live from Monday.com via the admin panel</div></div>';
    return;
  }
  var groups={},groupOrder=[];
  items.forEach(function(item){
    var g=item.group||'General';
    if(!groups[g]){groups[g]={total:0,done:0,start:'',end:''};groupOrder.push(g);}
    groups[g].total++;
    // FIX #9: use isDone()
    if(isDone(item.status))groups[g].done++;
    if(item.timeline){
      var parts=item.timeline.split(' - ');
      if(parts[0]&&(!groups[g].start||parts[0]<groups[g].start))groups[g].start=parts[0];
      if(parts[1]&&(!groups[g].end||parts[1]>groups[g].end))groups[g].end=parts[1];
    }
  });
  var MO=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  function fmtRange(s,e){
    if(!s)return'—';
    var sd=new Date(s),ed=new Date(e||s);
    return MO[sd.getMonth()]+' '+sd.getFullYear()+' – '+MO[ed.getMonth()]+' '+ed.getFullYear();
  }
  var activeGroup=groupOrder.find(function(g){var gr=groups[g];return gr.done>0&&gr.done<gr.total;})||groupOrder[0]||'—';
  var lastEnd='';
  groupOrder.forEach(function(g){if(groups[g].end>lastEnd)lastEnd=groups[g].end;});
  var compDate=lastEnd?new Date(lastEnd).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):'—';

  var html='<div class="kpi-grid cols-2" style="margin-bottom:16px">'
    +'<div class="kpi-card sched-kpi-phase"><div class="kpi-lbl">Current Phase</div><div class="sched-phase-val">'+activeGroup+'</div><div class="kpi-sub">Active now</div></div>'
    +'<div class="kpi-card sched-kpi-comp"><div class="kpi-lbl">Est. Completion</div><div class="sched-comp-val">'+compDate+'</div><div class="kpi-sub">Last task in Monday</div></div>'
    +'</div>'
    +'<div class="sec-card">'
    +'<div class="sec-head"><div><h2>Construction Phases</h2></div><div style="font-size:10px;color:rgba(255,255,255,.5)">Live · Monday.com</div></div>'
    +'<div class="phase-wrap">';

  groupOrder.forEach(function(g){
    var grp=groups[g];
    var pct=grp.total>0?Math.round((grp.done/grp.total)*100):0;
    var color=pct===100?'#15803d':pct>0?'#1e6fd9':'#9ca3af';
    html+='<div class="phase-row">'
      +'<div class="phase-dot" style="background:'+color+'"></div>'
      +'<div class="phase-name">'+g+'</div>'
      +'<div class="phase-track">'
      +(pct>0?'<div class="phase-fill" style="width:'+pct+'%;background:'+color+'"><span class="phase-pct">'+(pct===100?'Complete':pct+'%')+'</span></div>':'<span class="phase-sched">SCHEDULED</span>')
      +'</div>'
      +'<div class="phase-dates">'+fmtRange(grp.start,grp.end)+'</div>'
      +'</div>';
  });

  html+='</div></div>';
  $('tab-schedule').innerHTML=html;
}

// ── CALENDAR ──
function renderCalendar(){
  var html='<div class="cal-card">'
    +'<div class="cal-head"><div class="cal-head-title">Project Calendar</div>'
    +'<div class="cal-nav"><button class="cal-nav-btn" onclick="calNav(-1)">◀</button>'
    +'<span id="cal-month-label"></span>'
    +'<button class="cal-nav-btn" onclick="calNav(1)">▶</button></div></div>'
    +'<div class="cal-dow"><div>SUN</div><div>MON</div><div>TUE</div><div>WED</div><div>THU</div><div>FRI</div><div>SAT</div></div>'
    +'<div class="cal-days" id="cal-days"></div>'
    +'</div>';
  $('tab-calendar').innerHTML=html;
  buildCalDays();
}

function buildCalDays(){
  var lbl=$('cal-month-label');
  if(lbl)lbl.textContent=_MOS[_calMonth]+' '+_calYear;
  var td=new Date();td.setHours(0,0,0,0);
  var monthStart=new Date(_calYear,_calMonth,1);
  var monthEnd=new Date(_calYear,_calMonth+1,0);
  var fd=monthStart.getDay();
  var dim=monthEnd.getDate();
  var pd=new Date(_calYear,_calMonth,0).getDate();
  var totalCells=fd+dim;
  var totalRows=Math.ceil(totalCells/7);
  var gridStart=new Date(_calYear,_calMonth,1-fd);

  var ranges=[];
  _calItems.forEach(function(it){
    if(!it.timeline)return;
    var p=it.timeline.split(' - ');
    var s=new Date(p[0]+'T00:00:00'),e=new Date((p[1]||p[0])+'T00:00:00');
    if(isNaN(s))return;
    if(isNaN(e)||e<s)e=s;
    ranges.push({item:it,start:s,end:e});
  });

  var dayCellsHtml='';
  var cc=0;
  for(var i=fd-1;i>=0;i--){dayCellsHtml+='<div class="cal-day other-month"><div class="cal-day-num">'+(pd-i)+'</div></div>';cc++;}
  for(var d2=1;d2<=dim;d2++){
    var thisDate=new Date(_calYear,_calMonth,d2);
    var isT=(thisDate.getTime()===td.getTime());
    var dayKey=_calYear+'-'+String(_calMonth+1).padStart(2,'0')+'-'+String(d2).padStart(2,'0');
    var hasTask=ranges.some(function(r){return thisDate>=r.start&&thisDate<=r.end;});
    var oc=hasTask?' onclick="openCalPopup(this)" data-key="'+dayKey+'"':'';
    dayCellsHtml+='<div class="cal-day'+(isT?' today-cell':'')+(hasTask?' has-tasks':'')+'"'+oc+'><div class="cal-day-num">'+d2+'</div></div>';
    cc++;
  }
  var tr=(7-(cc%7))%7;
  for(var t2=1;t2<=tr;t2++){dayCellsHtml+='<div class="cal-day other-month"><div class="cal-day-num">'+t2+'</div></div>';cc++;}

  var rowsData=[];
  for(var row=0;row<totalRows;row++){
    var rowStart=new Date(gridStart);rowStart.setDate(gridStart.getDate()+row*7);
    var rowEnd=new Date(rowStart);rowEnd.setDate(rowStart.getDate()+6);
    var rowRanges=ranges.filter(function(r){return r.end>=rowStart&&r.start<=rowEnd;});
    rowRanges.sort(function(a,b){return a.start-b.start||(b.end-b.start)-(a.end-a.start);});
    var laneEnds=[];
    var segments=[];
    rowRanges.forEach(function(r){
      var colStart=Math.max(0,Math.round((r.start-rowStart)/86400000));
      var colEnd=Math.min(6,Math.round((r.end-rowStart)/86400000));
      var lane=0;
      while(laneEnds[lane]!==undefined&&laneEnds[lane]>=colStart)lane++;
      laneEnds[lane]=colEnd;
      segments.push({item:r.item,row:row,colStart:colStart,colEnd:colEnd,lane:lane});
    });
    rowsData.push({lanes:laneEnds.length,segments:segments});
  }

  var g=$('cal-days');
  if(g){
    g.innerHTML='';
    g.style.position='relative';
    g.style.display='block';
    var dayWrap=document.createElement('div');
    dayWrap.style.display='grid';
    dayWrap.style.gridTemplateColumns='repeat(7,1fr)';
    dayWrap.innerHTML=dayCellsHtml;
    g.appendChild(dayWrap);

    var overlay=document.createElement('div');
    overlay.style.position='absolute';
    overlay.style.left='0';overlay.style.top='0';overlay.style.width='100%';overlay.style.height='100%';
    overlay.style.pointerEvents='none';
    g.appendChild(overlay);

    var dayCellEls=dayWrap.children;
    var gridRect=g.getBoundingClientRect();

    for(var row3=0;row3<totalRows;row3++){
      var firstCellIdx=row3*7;
      var firstCell=dayCellEls[firstCellIdx];
      if(!firstCell)continue;
      var numEl=firstCell.querySelector('.cal-day-num');
      var cellRect=firstCell.getBoundingClientRect();
      var numRect=numEl?numEl.getBoundingClientRect():cellRect;
      var rowTopPx=cellRect.top-gridRect.top;
      var barsStartPx=(numRect.bottom-gridRect.top)+4;
      var neededLanes=rowsData[row3]?rowsData[row3].lanes:0;
      if(neededLanes>0){
        var neededHeight=(barsStartPx-rowTopPx)+neededLanes*19+6;
        for(var c=0;c<7;c++){
          var cellEl=dayCellEls[firstCellIdx+c];
          if(cellEl)cellEl.style.minHeight=Math.max(80,neededHeight)+'px';
        }
      }
    }

    gridRect=g.getBoundingClientRect();
    rowsData.forEach(function(rd){
      rd.segments.forEach(function(seg){
        var firstCellIdx=seg.row*7;
        var firstCell=dayCellEls[firstCellIdx];
        if(!firstCell)return;
        var numEl=firstCell.querySelector('.cal-day-num');
        var cellRect=firstCell.getBoundingClientRect();
        var numRect=numEl?numEl.getBoundingClientRect():cellRect;
        var topPx=(numRect.bottom-gridRect.top)+4+seg.lane*19;
        var bar=document.createElement('div');
        bar.className='cal-bar';
bar.style.left='calc('+(seg.colStart/7*100)+'%)';
bar.style.width='calc('+((seg.colEnd-seg.colStart+1)/7*100)+'%)';
        bar.style.top=topPx+'px';
        bar.style.background=groupColor(seg.item.group);
        bar.title=seg.item.name;
        bar.textContent=seg.item.name;
        bar.style.pointerEvents='auto';
        bar.onclick=(function(it){return function(){openCalPopupForItem(it);};})(seg.item);
        overlay.appendChild(bar);
      });
    });
  }
  renderCalLegend(ranges);
}

function dayKeyFromDate(d){
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

function renderCalLegend(ranges){
  var monthStart=new Date(_calYear,_calMonth,1);
  var monthEnd=new Date(_calYear,_calMonth+1,0);
  var seen={};
  ranges.forEach(function(r){
    if(r.end<monthStart||r.start>monthEnd)return;
    seen[r.item.group]=true;
  });
  var groups=Object.keys(seen);
  var card=$('tab-calendar')?$('tab-calendar').querySelector('.cal-card'):null;
  if(!card)return;
  var existing=card.querySelector('.cal-legend');
  if(existing)existing.remove();
  if(!groups.length)return;
  var lg=document.createElement('div');
  lg.className='cal-legend';
  groups.forEach(function(g){
    lg.innerHTML+='<div class="cal-legend-item"><div class="cal-legend-dot" style="background:'+groupColor(g)+'"></div>'+g+'</div>';
  });
  card.appendChild(lg);
}

function calNav(dir){
  _calMonth+=dir;
  if(_calMonth>11){_calMonth=0;_calYear++;}
  if(_calMonth<0){_calMonth=11;_calYear--;}
  buildCalDays();
}

function openCalPopup(el){
  var k=el.dataset.key;
  var dt=new Date(k+'T00:00:00');
  var ts3=_calItems.filter(function(it){
    if(!it.timeline)return false;
    var p=it.timeline.split(' - ');
    var s=new Date(p[0]+'T00:00:00'),e=new Date((p[1]||p[0])+'T00:00:00');
    return dt>=s&&dt<=e;
  });
  if(!ts3.length)return;
  var te=$('cal-popup-title');
  if(te)te.textContent=_MOS[dt.getMonth()]+' '+dt.getDate()+', '+dt.getFullYear()+' — '+ts3.length+' task'+(ts3.length>1?'s':'');
  var bd=$('cal-popup-body');
  if(bd){
    var h='';
    ts3.forEach(function(t){
      var color=groupColor(t.group);
      h+='<div class="cal-popup-item"><div style="flex:1"><div style="font-size:12px;font-weight:600;color:var(--text)">'+t.name+'</div><div style="font-size:10px;color:var(--gray4);margin-top:1px;font-family:var(--mono)">'+t.group+'</div></div><span style="font-size:10px;font-weight:600;padding:2px 9px;border-radius:99px;background:'+color+'22;color:'+color+'">'+(t.status||'Scheduled')+'</span></div>';
    });
    bd.innerHTML=h;
  }
  $('cal-popup').classList.add('open');
  $('cal-popup-overlay').classList.add('open');
}

function openCalPopupForItem(item){
  if(!item.timeline)return;
  var startStr=item.timeline.split(' - ')[0];
  openCalPopup({dataset:{key:startStr}});
}

function closeCalPopup(){
  $('cal-popup').classList.remove('open');
  $('cal-popup-overlay').classList.remove('open');
}

loadData();
